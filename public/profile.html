<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | FLEXY Collectors</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        .profile-header {
            background: var(--dark-2);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            overflow: hidden;
            margin-bottom: 2rem;
            position: relative;
            margin-top: 2rem;
        }
        .profile-cover {
            height: 200px;
            background: linear-gradient(135deg, var(--dark-1) 0%, var(--dark-3) 100%);
            background-size: cover;
            background-position: center;
        }
        .profile-info {
            padding: 1.5rem;
            display: flex;
            align-items: flex-end;
            gap: 1.5rem;
            position: relative;
            top: -50px;
            margin-bottom: -50px;
        }
        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid var(--dark-2);
            background: var(--dark-3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: bold;
            flex-shrink: 0;
            background-size: cover;
            background-position: center;
        }
        .profile-details {
            flex: 1;
            padding-bottom: 0.5rem;
        }
        .profile-name {
            font-family: var(--font-brand);
            font-size: 1.8rem;
            margin: 0;
            color: var(--text-primary);
        }
        .profile-username {
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin: 0.2rem 0 0.5rem 0;
        }
        .profile-bio {
            font-size: 0.9rem;
            color: var(--text-primary);
            max-width: 600px;
            line-height: 1.4;
            margin-bottom: 1rem;
        }
        .profile-stats {
            display: flex;
            gap: 1.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
        }
        .profile-stats span {
            color: var(--text-primary);
            font-weight: 700;
        }
        .profile-actions {
            display: flex;
            gap: 1rem;
            padding-bottom: 0.5rem;
        }
        
        .profile-tabs {
            display: flex;
            background: var(--dark-2);
            border-bottom: 1px solid var(--border-glass);
            margin-bottom: 2rem;
            border-radius: var(--radius-md) var(--radius-md) 0 0;
        }
        .profile-tab {
            padding: 1rem 2rem;
            cursor: pointer;
            color: var(--text-muted);
            font-weight: 600;
            border-bottom: 2px solid transparent;
            transition: all var(--transition-fast);
        }
        .profile-tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
            background: var(--dark-1);
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-bottom: 4rem;
        }
    </style>
</head>
<body class="page-fade-in">
    <!-- Header -->
    <header class="app-header">
        <div class="header-container container">
            <div class="logo-section" onclick="window.location.href='home.html'" style="cursor: pointer;">
                <div style="display: flex; align-items: center;">
                    <div class="logo-icon" aria-hidden="true" style="color: var(--primary); width: 32px; height: 32px; margin-right: 0.5rem;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="width: 100%; height: 100%;"><path d="m15 5 4 4" /><path d="m11 9 4 4" /><path d="m13 7-8 8" /><path d="M9 11l-4 4" /><path d="m13 13-7 7" /><path d="M20 20H10" /></svg>
                    </div>
                    <h1 class="app-logo">FLEXY</h1>
                </div>
            </div>
            
            <div class="header-actions">
                <button class="header-btn" onclick="window.location.href='home.html'">Home</button>
                <button class="header-btn" onclick="window.location.href='explore.html'">Explore</button>
                <button class="header-btn" onclick="window.location.href='communities.html'">Communities</button>
                <button class="header-btn" onclick="window.location.href='collections.html'">Collections</button>
                <button class="header-btn" onclick="window.location.href='auctions.html'">Auctions</button>
                <button class="header-btn" onclick="window.location.href='messages.html'">Messages</button>
                <button class="header-btn" id="nav-notifications-btn" onclick="window.location.href='notifications.html'">Notifications</button>
                <button class="header-btn" onclick="window.location.href='wallet.html'">Wallet</button>
                <button class="header-btn" onclick="window.location.href='profile.html'">Profile</button>
                <button class="btn btn-primary" onclick="window.location.href='sell.html'" style="margin-left: 1rem; padding: 0.4rem 1.2rem; border-radius: var(--radius-full);">Sell Item</button>
            </div>
        </div>
    </header>
    
    <!-- Main Content -->
    <main class="main-container container" id="profile-container" style="display: none;">
        
        <div class="profile-header animate-fade-up stagger-1">
            <div class="profile-cover" id="profile-cover"></div>
            <div class="profile-info">
                <div class="profile-avatar" id="profile-avatar">U</div>
                <div class="profile-details">
                    <h1 class="profile-name" id="profile-name">User Name</h1>
                    <p class="profile-username" id="profile-username">@username</p>
                    <p class="profile-bio" id="profile-bio">Collector bio goes here.</p>
                    <div class="profile-stats">
                        <div><span id="stat-followers">0</span> Followers</div>
                        <div><span id="stat-following">0</span> Following</div>
                    </div>
                </div>
                <div class="profile-actions" id="profile-actions-container">
                    <!-- Populated dynamically based on if it's My Profile or Other -->
                </div>
            </div>
        </div>

        <div class="profile-tabs animate-fade-up stagger-2">
            <div class="profile-tab active" onclick="profileApp.switchTab('museum')" id="tab-museum">Museum</div>
            <div class="profile-tab" onclick="profileApp.switchTab('auctions')" id="tab-auctions">Auctions</div>
            <div class="profile-tab" onclick="profileApp.switchTab('communities')" id="tab-communities">Communities</div>
            <div class="profile-tab" onclick="profileApp.switchTab('groups')" id="tab-groups">Groups</div>
        </div>

        <div id="content-museum" class="grid-container animate-fade-up stagger-3"></div>
        <div id="content-auctions" class="grid-container animate-fade-up stagger-3" style="display: none;"></div>
        <div id="content-communities" class="grid-container animate-fade-up stagger-3" style="display: none;"></div>
        <div id="content-groups" class="grid-container animate-fade-up stagger-3" style="display: none;"></div>
        
    </main>

    <div id="loading-state" class="container" style="text-align: center; padding: 5rem 0;">
        <div class="loading-spinner" style="margin: 0 auto 1rem;"></div>
        <p style="color: var(--text-secondary);">Loading Profile...</p>
    </div>

    <!-- Edit Profile Modal -->
    <div class="modal-overlay" id="edit-profile-modal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 1000; overflow-y: auto; padding: 2rem;">
        <div class="modal-content" style="background: var(--dark-2); border: 1px solid var(--border-glass); border-radius: var(--radius-lg); max-width: 500px; margin: 0 auto; position: relative; padding: 2rem;">
            <button class="close-modal" onclick="document.getElementById('edit-profile-modal').style.display='none'" style="position: absolute; top: 15px; right: 20px; background: none; border: none; font-size: 1.5rem; color: var(--text-muted); cursor: pointer;">×</button>
            <h2 style="font-family: var(--font-brand); margin-bottom: 1.5rem;">Edit Profile</h2>
            <form id="edit-profile-form">
                <div class="form-group" style="margin-bottom: 1rem;">
                    <label>Display Name</label>
                    <input type="text" id="edit-display-name">
                </div>
                <div class="form-group" style="margin-bottom: 1rem;">
                    <label>Username</label>
                    <input type="text" id="edit-username">
                </div>
                <div class="form-group" style="margin-bottom: 1rem;">
                    <label>Bio</label>
                    <textarea id="edit-bio" rows="3"></textarea>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Save Changes</button>
            </form>
        </div>
    </div>

    <script src="js/notify.js"></script>
    <script src="js/api.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
