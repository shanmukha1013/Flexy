<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Hub | Flexy Collectors</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        .community-layout {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 2rem;
            margin-top: 2rem;
            padding-bottom: 4rem;
        }
        @media (max-width: 900px) {
            .community-layout {
                grid-template-columns: 1fr;
            }
        }
        .community-sidebar {
            position: sticky;
            top: 88px;
            height: fit-content;
        }
        .member-avatar-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        .member-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 35px;
            height: 35px;
            background: var(--dark-2);
            border-radius: 50%;
            font-size: 0.8rem;
            font-weight: 700;
            border: 1px solid var(--border-glass);
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        .member-badge:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }
        .group-card {
            background: var(--dark-2);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-md);
            padding: 1rem;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        .group-card:hover {
            border-color: var(--primary);
            background: var(--primary-glow);
        }
    </style>
</head>
<body class="page-fade-in">
    <!-- Header -->
    <header class="app-header">
        <div class="header-container container">
            <div class="logo-section" onclick="window.location.href='home.html'" style="cursor: pointer;">
                <div style="display: flex; align-items: center;">
                    <div class="logo-icon" aria-hidden="true" style="color: var(--primary); width: 32px; height: 32px; margin-right: 0.5rem;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="width: 100%; height: 100%;">
                        <path d="m15 5 4 4" /><path d="m11 9 4 4" /><path d="m13 7-8 8" /><path d="M9 11l-4 4" /><path d="m13 13-7 7" /><path d="M20 20H10" />
                    </svg>
                </div>
                    <h1 class="app-logo">FLEXY</h1>
                </div>
            </div>
            
            <div class="header-actions">
                <button class="header-btn" onclick="window.location.href='home.html'">Home</button>
                <button class="header-btn" onclick="window.location.href='explore.html'">Explore</button>
                <button class="header-btn active" onclick="window.location.href='communities.html'">Communities</button>
                <button class="header-btn" onclick="window.location.href='collections.html'">Collections</button>
                <button class="header-btn" onclick="window.location.href='auctions.html'">Auctions</button>
                <button class="header-btn" onclick="window.location.href='messages.html'">Messages</button>
                <button class="header-btn" id="nav-notifications-btn" onclick="window.location.href='notifications.html'">Notifications</button>
                <button class="header-btn" onclick="window.location.href='wallet.html'">Wallet</button>
                <button class="header-btn" onclick="window.location.href='profile.html'">Profile</button>
                <button class="btn btn-primary" onclick="window.location.href='sell.html'" style="margin-left: 1rem; padding: 0.4rem 1.2rem; border-radius: var(--radius-full);">Sell Item</button>
            </div>
        </div>
    </header>
    
    <!-- Main Content -->
    <main class="main-container container" id="community-page-container" style="display: none;">
        <div class="community-layout">
            <!-- Sidebar Details -->
            <div class="community-sidebar animate-fade-up stagger-1">
                <div class="glass-card" style="padding: 1.5rem; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 1rem;">
                    <div id="community-icon" style="font-size: 4rem; background: var(--dark-2); border-radius: var(--radius-lg); width: 100px; height: 100px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border-glass);">🏛️</div>
                    <div>
                        <h2 id="community-title" style="font-family: var(--font-brand); font-size: 1.50rem; margin-bottom: 0.5rem;">Community Title</h2>
                        <p id="community-creator" style="font-size: 0.8rem; color: var(--text-muted); font-weight: 500;">Created by @creator</p>
                    </div>
                    <p id="community-desc" style="color: var(--text-secondary); font-size: 0.9rem; line-height: 1.5; margin: 0;">Community description goes here.</p>
                    
                    <!-- Join Community button removed (WhatsApp style: join via groups) -->
                    <div style="width: 100%; border-top: 1px solid var(--border-glass); padding-top: 1rem; text-align: left;">
                        <h4 style="font-family: var(--font-brand); font-size: 0.95rem; margin-bottom: 0.5rem; letter-spacing: 0.5px; display: flex; justify-content: space-between;">
                            Members <span id="member-count" style="color: var(--primary);">0</span>
                        </h4>
                        <div id="community-members-list" class="member-avatar-list"></div>
                    </div>
                </div>
            </div>

            <!-- Main Feed & Groups -->
            <div class="community-main animate-fade-up stagger-2">
                
                <!-- Sub Groups Section -->
                <div class="glass-card" style="padding: 1.5rem; margin-bottom: 2rem;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                        <h3 style="font-family: var(--font-brand); margin: 0;">Sub-Groups</h3>
                        <button class="btn btn-outline" id="create-group-btn" style="padding: 0.3rem 0.8rem; font-size: 0.8rem; border-radius: var(--radius-sm);" onclick="window.createGroup()">+ Create Group</button>
                    </div>
                    <div id="community-groups-list">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <!-- Community Feed Section -->
                <div class="glass-card" style="padding: 1.5rem;">
                    <h3 style="font-family: var(--font-brand); margin: 0 0 1.5rem 0;">Community Activity</h3>
                    
                    <!-- Post input -->
                    <div id="post-input-area" style="display: none; background: var(--dark-2); padding: 1rem; border-radius: var(--radius-md); border: 1px solid var(--border-glass); margin-bottom: 2rem;">
                        <textarea id="new-post-content" rows="3" placeholder="Share an update, ask a question, or discuss an item..." style="width: 100%; background: transparent; border: none; color: var(--text-primary); resize: none; margin-bottom: 1rem; font-family: inherit; font-size: 0.9rem; outline: none;"></textarea>
                        <div style="display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border-glass); padding-top: 0.5rem;">
                            <span style="font-size: 0.8rem; color: var(--text-muted);">Post to this community</span>
                            <button class="btn btn-primary" onclick="window.submitPost()" style="padding: 0.3rem 1.5rem; border-radius: var(--radius-full);">Post</button>
                        </div>
                    </div>

                    <div id="community-feed">
                        <!-- Populated by JS -->
                    </div>
                </div>

            </div>
        </div>
    </main>

    <div id="loading-state" class="container" style="text-align: center; padding: 5rem 0;">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="spin" style="color: var(--primary);">
            <circle cx="12" cy="12" r="10" opacity="0.25"></circle>
            <path d="M12 2a10 10 0 0 1 10 10" opacity="0.75"></path>
        </svg>
        <p style="margin-top: 1rem; color: var(--text-secondary);">Loading community hub...</p>
    </div>

    <!-- Create Group Modal -->
    <div class="modal-overlay" id="create-group-modal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 1000; overflow-y: auto; padding: 2rem;">
        <div class="modal-content" style="background: var(--dark-2); border: 1px solid var(--border-glass); border-radius: var(--radius-lg); max-width: 500px; margin: 0 auto; position: relative; padding: 2rem;">
            <button class="close-modal" onclick="document.getElementById('create-group-modal').style.display='none'" style="position: absolute; top: 15px; right: 20px; background: none; border: none; font-size: 1.5rem; color: var(--text-muted); cursor: pointer;">×</button>
            <h2 style="font-family: var(--font-brand); margin-bottom: 1.5rem;">Create Sub-Group</h2>
            <form id="create-group-form">
                <div class="form-group" style="margin-bottom: 1rem;">
                    <label>Group Name *</label>
                    <input type="text" id="new-group-name" required placeholder="e.g. Silver Coins ONLY">
                </div>
                <div class="form-group" style="margin-bottom: 1rem;">
                    <label>Description *</label>
                    <textarea id="new-group-desc" required rows="3" placeholder="What is this group about?"></textarea>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Create Group</button>
            </form>
        </div>
    </div>

    <script src="js/notify.js"></script>
    <script src="js/api.js"></script>
    <script src="js/community.js"></script>
</body>
</html>
