<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Feed | Flexy Collectors</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        .community-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }
        @media (max-width: 768px) {
            .community-layout {
                grid-template-columns: 1fr;
            }
        }
        .community-sidebar {
            position: sticky;
            top: 88px;
            height: fit-content;
        }
        .member-avatar-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        .member-badge {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            background: var(--dark-2);
            padding: 0.25rem 0.6rem;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 500;
        }
    </style>
</head>
<body class="page-fade-in">
    <!-- Header -->
    <header class="app-header">
        <div class="header-container container">
            <div class="logo-section" onclick="window.location.href='home.html'" style="cursor: pointer;">
                <div style="display: flex; align-items: center;">
                    <div class="logo-icon" aria-hidden="true" style="color: var(--primary); width: 32px; height: 32px; margin-right: 0.5rem;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="width: 100%; height: 100%;">
    <path d="m15 5 4 4" />
    <path d="m11 9 4 4" />
    <path d="m13 7-8 8" />
    <path d="M9 11l-4 4" />
    <path d="m13 13-7 7" />
    <path d="M20 20H10" />
</svg>
                </div>
                    <h1 class="app-logo">FLEXY</h1>
                </div>
            </div>
            
            <div class="header-actions">
                <button class="header-btn" onclick="window.location.href='home.html'">Home</button>
                <button class="header-btn" onclick="window.location.href='explore.html'">Explore</button>
                <button class="header-btn active" onclick="window.location.href='communities.html'">Communities</button>
                <button class="header-btn" onclick="window.location.href='collections.html'">Collections</button>
                <button class="header-btn" onclick="window.location.href='auctions.html'">Auctions</button>
                <button class="header-btn" onclick="window.location.href='messages.html'">Messages</button>
                <button class="header-btn" onclick="window.location.href='wallet.html'">Wallet</button>
                <button class="header-btn" onclick="window.location.href='profile.html'">Profile</button>
            </div>
        </div>
    </header>
    
    <!-- Main Content -->
    <main class="main-container container" id="community-page-container" style="max-width: 1000px; display: none;">
        <div class="community-layout">
            <!-- Sidebar Details -->
            <div class="community-sidebar">
                <div class="glass-card" style="padding: 1.5rem; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 1rem;">
                    <div id="community-icon" style="font-size: 4rem; background: var(--dark-2); border-radius: var(--radius-lg); width: 100px; height: 100px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border-glass);">🏛️</div>
                    <div>
                        <h2 id="community-title" style="font-family: var(--font-brand); font-size: 1.50rem; margin-bottom: 0.5rem;">Community Title</h2>
                        <p id="community-curator" style="font-size: 0.8rem; color: var(--text-muted); font-weight: 500;">Curated by @curator</p>
                    </div>
                    <p id="community-desc" style="color: var(--text-secondary); font-size: 0.9rem; line-height: 1.5; margin: 0;">Community description goes here.</p>
                    
                    <button class="btn btn-primary" id="community-join-btn" style="width: 100%; border-radius: var(--radius-full); padding: 0.7rem 1.5rem; font-weight: 600;">Request Admission</button>
                    
                    <div style="width: 100%; border-top: 1px solid var(--border-glass); padding-top: 1rem; text-align: left;">
                        <h4 style="font-family: var(--font-brand); font-size: 0.95rem; margin-bottom: 0.5rem; letter-spacing: 0.5px;">Eminent Members</h4>
                        <div id="community-members-list" class="member-avatar-list"></div>
                    </div>
                </div>
            </div>

            <!-- Feed Column -->
            <div class="community-feed-column">
                <!-- Create Post Card -->
                <div class="glass-card" id="community-new-post-card" style="padding: 1.5rem; margin-bottom: 1.5rem; display: none;">
                    <div style="display: flex; gap: 1rem; align-items: flex-start;">
                        <div class="avatar-circle" id="new-post-avatar" style="width: 45px; height: 45px; background: var(--primary);">U</div>
                        <div style="flex: 1; display: flex; flex-direction: column; gap: 1rem;">
                            <textarea id="community-post-content" placeholder="Share a new acquisition or collector update with this community..." style="width: 100%; min-height: 100px; border: none; background: transparent; color: var(--text-primary); font-family: var(--font-app); font-size: 1.05rem; outline: none; resize: none;"></textarea>
                            
                            <!-- Image upload preview -->
                            <div id="community-post-preview" style="display: none; height: 250px; background-size: cover; background-position: center; border-radius: var(--radius-md); position: relative; margin-bottom: 0.5rem;">
                                <button onclick="window.clearCommunityPostImage()" style="position: absolute; top: 10px; right: 10px; border-radius: 50%; border: none; width: 30px; height: 30px; background: rgba(0,0,0,0.6); color: white; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center;">&times;</button>
                            </div>
                            
                            <div style="display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border-glass); padding-top: 1rem;">
                                <button class="btn btn-outline" style="border-radius: var(--radius-full); padding: 0.5rem 1.2rem; font-size: 0.85rem; display: flex; align-items: center; gap: 0.5rem;" onclick="document.getElementById('community-post-image-input').click()">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
                                    Add Media
                                </button>
                                <input type="file" id="community-post-image-input" accept="image/*" style="display: none;" onchange="window.handleCommunityPostImage(this)">
                                <button class="btn btn-primary" onclick="window.createCommunityPost()" style="border-radius: var(--radius-full); padding: 0.5rem 1.8rem; font-size: 0.85rem; font-weight: 600;">Flex Archive</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Feed Container -->
                <div id="community-posts-container">
                    <div class="loading-spinner" style="margin: 5rem auto;"></div>
                </div>
            </div>
        </div>
    </main>

    <div id="community-loading-view" class="container" style="padding: 10rem 0; text-align: center;">
        <div class="loading-spinner" style="margin: 0 auto 2rem auto;"></div>
        <p style="color: var(--text-secondary); font-family: var(--font-brand); font-size: 1.1rem;">Retrieving Community Registry...</p>
    </div>

    <script src="js/api.js"></script>
</body>
</html>
