<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLEXY | Create Community</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        .step-indicator {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            position: relative;
        }
        .step-indicator::before {
            content: '';
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--border-subtle);
            z-index: 1;
        }
        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 5;
        }
        .step-number {
            width: 42px;
            height: 42px;
            border-radius: var(--radius-full);
            background: var(--dark-2);
            border: 2px solid var(--border-glass);
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }
        .step.active .step-number {
            background: var(--primary);
            border-color: var(--primary);
            color: var(--black);
        }
        .step.completed .step-number {
            background: var(--primary);
            border-color: var(--primary);
            color: var(--black);
        }
        .step-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-top: 0.5rem;
            text-transform: uppercase;
        }
        .step.active .step-label { color: var(--text-primary); }
        
        .form-step { display: none; }
        .form-step.active { display: block; animation: fade 0.3s; }
        @keyframes fade { from { opacity: 0; } to { opacity: 1; } }

        .group-select-card {
            background: var(--dark-2);
            border: 1px solid var(--border-glass);
            padding: 1rem;
            border-radius: var(--radius-md);
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        .group-select-card:hover { border-color: var(--primary); }
        .group-select-card.selected {
            background: rgba(15, 157, 122, 0.1);
            border-color: var(--primary);
        }
    </style>
</head>
<body class="page-fade-in">
    <!-- Header -->
    <header class="app-header">
        <div class="header-container container">
            <div class="logo-section" onclick="window.location.href='home.html'" style="cursor: pointer;">
                <h1 class="app-logo">FLEXY</h1>
            </div>
            
            <div class="header-actions">
                <button class="header-btn" onclick="window.location.href='home.html'">Home</button>
                <button class="header-btn active" onclick="window.location.href='communities.html'">Communities</button>
                <button class="header-btn" onclick="window.location.href='profile.html'">Profile</button>
                <button class="btn btn-primary" onclick="window.location.href='sell.html'" style="margin-left: 1rem; border-radius: var(--radius-full); padding: 0.4rem 1.2rem;">Sell Item</button>
            </div>
        </div>
    </header>

    <main class="main-container container" style="max-width: 700px; padding-top: 4rem;">
        <div class="glass-card animate-fade-up stagger-1" style="padding: 2.5rem;">
            
            <div class="step-indicator">
                <div class="step active" id="step-1-indicator">
                    <div class="step-number">1</div>
                    <div class="step-label">Basic Info</div>
                </div>
                <div class="step" id="step-2-indicator">
                    <div class="step-number">2</div>
                    <div class="step-label">Select Groups</div>
                </div>
                <div class="step" id="step-3-indicator">
                    <div class="step-number">3</div>
                    <div class="step-label">Review</div>
                </div>
            </div>

            <!-- STEP 1 -->
            <div class="form-step active" id="step-1">
                <h2 style="font-family: var(--font-brand);">Community Details</h2>
                <p style="color: var(--text-secondary); margin-bottom: 2rem;">A community is an umbrella that holds multiple groups together.</p>
                
                <div class="form-group">
                    <label>Community Name</label>
                    <input type="text" id="comm-name" placeholder="e.g., Global Numismatics Hub" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="comm-desc" rows="3" required></textarea>
                </div>
                <div class="form-group">
                    <label>Emoji Icon</label>
                    <input type="text" id="comm-icon" placeholder="🏛️" value="🏛️">
                </div>
            </div>

            <!-- STEP 2 -->
            <div class="form-step" id="step-2">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <div>
                        <h2 style="font-family: var(--font-brand); margin: 0;">Add Groups</h2>
                        <p style="color: var(--text-secondary); margin: 0;">Select groups to include. You must add at least one group.</p>
                    </div>
                    <button class="btn btn-outline" onclick="window.location.href='create-group.html'">+ New Group</button>
                </div>
                
                <div id="groups-list">
                    <div style="text-align: center; padding: 2rem;">Loading your groups...</div>
                </div>
            </div>

            <!-- STEP 3 -->
            <div class="form-step" id="step-3">
                <h2 style="font-family: var(--font-brand);">Review Community</h2>
                <div style="background: var(--dark-2); padding: 1.5rem; border-radius: var(--radius-md); margin-top: 1.5rem;">
                    <div style="font-size: 3rem; margin-bottom: 1rem;" id="review-icon">🏛️</div>
                    <h3 id="review-name" style="margin: 0 0 0.5rem 0;">Name</h3>
                    <p id="review-desc" style="color: var(--text-secondary);"></p>
                    <div style="margin-top: 1rem; color: var(--primary); font-weight: 600;" id="review-groups-count">0 Groups Selected</div>
                </div>
            </div>

            <div style="display: flex; justify-content: space-between; margin-top: 3rem; border-top: 1px solid var(--border-glass); padding-top: 1.5rem;">
                <button class="btn btn-outline" id="btn-back" style="display: none;" onclick="ccApp.prevStep()">Back</button>
                <div style="flex:1;"></div>
                <button class="btn btn-primary" id="btn-next" onclick="ccApp.nextStep()">Next Step</button>
                <button class="btn btn-primary" id="btn-submit" style="display: none;" onclick="ccApp.submit()">Create Community</button>
            </div>
            
        </div>
    </main>

    <script src="js/notify.js"></script>
    <script src="js/api.js"></script>
    <script src="js/create-community.js"></script>
</body>
</html>
