<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collections | FLEXY Collectors</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body class="page-fade-in">
    <!-- Header -->
    <header class="app-header">
        <div class="header-container container">
            <div class="logo-section" onclick="window.location.href='home.html'" style="cursor: pointer;">
                <div style="display: flex; align-items: center;">
                    <div class="logo-icon" aria-hidden="true" style="color: var(--primary); width: 32px; height: 32px; margin-right: 0.5rem;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="width: 100%; height: 100%;">
    <path d="m15 5 4 4" />
    <path d="m11 9 4 4" />
    <path d="m13 7-8 8" />
    <path d="M9 11l-4 4" />
    <path d="m13 13-7 7" />
    <path d="M20 20H10" />
</svg>
                </div>
                    <h1 class="app-logo">FLEXY</h1>
                </div>
            </div>
            
            <div class="header-actions">
                <button class="header-btn" onclick="window.location.href='home.html'">Home</button>
                <button class="header-btn" onclick="window.location.href='explore.html'">Explore</button>
                <button class="header-btn" onclick="window.location.href='communities.html'">Communities</button>
                <button class="header-btn active" onclick="window.location.href='collections.html'">Collections</button>
                <button class="header-btn" onclick="window.location.href='auctions.html'">Auctions</button>
                <button class="header-btn" onclick="window.location.href='messages.html'">Messages</button>
<button class="header-btn" id="nav-notifications-btn" onclick="window.location.href='notifications.html'">Notifications <span class="notification-badge" id="nav-notification-badge" style="display: none; background: #EF4444; color: white; border-radius: 50%; padding: 0.15rem 0.4rem; font-size: 0.7rem; font-weight: bold; margin-left: 0.3rem;">0</span></button>
                <button class="header-btn" onclick="window.location.href='wallet.html'">Wallet</button>
                <button class="header-btn" onclick="window.location.href='profile.html'">Profile</button>
            </div>
        </div>
    </header>
    
    <!-- Main Content -->
    <main class="main-container container">
        <section style="margin-top: 3rem; text-align: center; border-bottom: 1px solid var(--border-glass); padding-bottom: 3rem;">
            <h2 class="display-title animate-fade-up stagger-1">The Digital Museum</h2>
            <p class="animate-fade-up stagger-2" style="color: var(--text-secondary); max-width: 600px; margin: 1rem auto;">Explore beautifully curated collections of rare items from passionate enthusiasts around the globe. No price tags, just admiration.</p>
            
            <div class="animate-fade-up stagger-3" style="margin-top: 2rem; display: flex; justify-content: center; gap: 1rem;">
                <button class="btn btn-primary" style="border-radius: var(--radius-full);" onclick="window.createCollection()">Create Collection</button>
                <button class="btn btn-outline" style="border-radius: var(--radius-full);" onclick="window.viewMyMuseum()">My Museum</button>
            </div>
        </section>

        <!-- Collection Grids -->
        <section class="animate-fade-up stagger-4" style="margin-top: 4rem;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h3>Featured Exhibits</h3>
            </div>
            <div id="collections-feed-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 2rem;">
                <div class="skeleton-card skeleton" style="height: 400px;"></div>
                <div class="skeleton-card skeleton" style="height: 400px;"></div>
            </div>
        </section>
    </main>
    <script src="js/api.js"></script>
</body>
</html>
