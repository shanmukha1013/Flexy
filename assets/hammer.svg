<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" class="flexy-luxury-logo">
  <!-- Octagonal Display Frame / Cut Gem Outline -->
  <polygon points="10,2 22,2 30,10 30,22 22,30 10,30 2,22 2,10" stroke="url(#luxury-grad)" stroke-width="1.5" fill="rgba(49, 46, 129, 0.15)"/>
  
  <!-- Gavel Head (Top bar of F) -->
  <path d="M8 8 H24 V11 H8 Z" fill="url(#luxury-grad)" rx="1"/>
  
  <!-- Handle (Vertical Stem of F) -->
  <path d="M12 11 H15 V24 H12 Z" fill="url(#luxury-grad)" rx="0.5"/>
  
  <!-- Gavel Collar / Middle F-arm -->
  <path d="M15 15 H21 V17 H15 Z" fill="url(#luxury-grad)" rx="0.5"/>
  
  <!-- Strike Plate (Base pedestal) -->
  <path d="M7 24 H18 V26 H7 Z" fill="url(#luxury-grad)" rx="0.5"/>
  
  <!-- Small Gem Motif at the center of the frame background -->
  <circle cx="16" cy="16" r="1.5" fill="#F9A8D4" opacity="0.8"/>
  
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="luxury-grad" x1="2" y1="2" x2="30" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A78BFA"/> <!-- Lavender -->
      <stop offset="50%" stop-color="#F9A8D4"/> <!-- Soft Blush -->
      <stop offset="100%" stop-color="#312E81"/> <!-- Deep Indigo -->
    </linearGradient>
  </defs>
</svg>