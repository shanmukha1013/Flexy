<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages | FLEXY Collectors</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        .inbox-layout {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 0;
            min-height: calc(100vh - 150px);
            background: var(--dark-1);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            overflow: hidden;
            margin-top: 2rem;
            margin-bottom: 2rem;
        }
        @media (max-width: 768px) {
            .inbox-layout { grid-template-columns: 1fr; }
            .chat-main { display: none; }
            .inbox-layout.chat-open .inbox-sidebar { display: none; }
            .inbox-layout.chat-open .chat-main { display: flex; }
        }

        /* Sidebar */
        .inbox-sidebar {
            border-right: 1px solid var(--border-glass);
            display: flex;
            flex-direction: column;
            background: var(--dark-2);
        }
        .inbox-search {
            padding: 1rem;
            border-bottom: 1px solid var(--border-glass);
        }
        .inbox-search input {
            width: 100%;
            background: var(--dark-1);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-full);
            padding: 0.6rem 1rem;
            color: var(--text-primary);
            font-size: 0.9rem;
        }
        .inbox-search input:focus { outline: none; border-color: var(--primary); }
        .inbox-list {
            flex: 1;
            overflow-y: auto;
        }
        
        .chat-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 1rem;
            cursor: pointer;
            transition: background var(--transition-fast);
            border-bottom: 1px solid var(--border-subtle);
        }
        .chat-item:hover, .chat-item.active { background: var(--dark-1); }
        .chat-item.unread { background: rgba(15, 157, 122, 0.05); }
        
        .chat-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--dark-3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1rem;
            flex-shrink: 0;
            border: 1px solid var(--border-glass);
            background-size: cover;
            background-position: center;
        }
        
        /* Chat Main Area */
        .chat-main {
            display: flex;
            flex-direction: column;
            background: var(--dark-1);
        }
        .chat-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border-glass);
            display: flex;
            align-items: center;
            gap: 1rem;
            background: var(--dark-2);
        }
        .back-btn {
            display: none;
            background: none;
            border: none;
            color: var(--text-primary);
            font-size: 1.5rem;
            cursor: pointer;
        }
        @media (max-width: 768px) {
            .back-btn { display: block; }
        }
        
        .chat-messages {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .message-bubble {
            max-width: 70%;
            padding: 0.8rem 1rem;
            border-radius: 1rem;
            font-size: 0.95rem;
            line-height: 1.4;
            position: relative;
        }
        .msg-received {
            align-self: flex-start;
            background: var(--dark-2);
            border: 1px solid var(--border-glass);
            border-bottom-left-radius: 0.2rem;
        }
        .msg-sent {
            align-self: flex-end;
            background: var(--primary);
            color: var(--black);
            font-weight: 500;
            border-bottom-right-radius: 0.2rem;
        }
        .msg-time {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 0.3rem;
            display: block;
            text-align: right;
        }
        .msg-sent .msg-time {
            color: rgba(0,0,0,0.6);
        }
        
        .chat-input-area {
            padding: 1rem 1.5rem;
            border-top: 1px solid var(--border-glass);
            background: var(--dark-2);
            display: flex;
            gap: 1rem;
            align-items: flex-end;
        }
        .chat-input-area textarea {
            flex: 1;
            background: var(--dark-1);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-md);
            padding: 0.8rem 1rem;
            color: var(--text-primary);
            font-family: inherit;
            resize: none;
            max-height: 120px;
            min-height: 44px;
        }
        .chat-input-area textarea:focus {
            outline: none;
            border-color: var(--primary);
        }
        .chat-input-area button {
            border-radius: var(--radius-full);
            padding: 0 1.5rem;
            height: 44px;
        }
        
        .empty-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            text-align: center;
        }
    </style>
</head>
<body class="page-fade-in">
    <!-- Header -->
    <header class="app-header">
        <div class="header-container container">
            <div class="logo-section" onclick="window.location.href='home.html'" style="cursor: pointer;">
                <div style="display: flex; align-items: center;">
                    <div class="logo-icon" aria-hidden="true" style="color: var(--primary); width: 32px; height: 32px; margin-right: 0.5rem;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="width: 100%; height: 100%;"><path d="m15 5 4 4" /><path d="m11 9 4 4" /><path d="m13 7-8 8" /><path d="M9 11l-4 4" /><path d="m13 13-7 7" /><path d="M20 20H10" /></svg>
                    </div>
                    <h1 class="app-logo">FLEXY</h1>
                </div>
            </div>
            
            <div class="header-actions">
                <button class="header-btn" onclick="window.location.href='home.html'">Home</button>
                <button class="header-btn" onclick="window.location.href='explore.html'">Explore</button>
                <button class="header-btn" onclick="window.location.href='communities.html'">Communities</button>
                <button class="header-btn" onclick="window.location.href='collections.html'">Collections</button>
                <button class="header-btn" onclick="window.location.href='auctions.html'">Auctions</button>
                <button class="header-btn active" onclick="window.location.href='messages.html'">Messages</button>
                <button class="header-btn" id="nav-notifications-btn" onclick="window.location.href='notifications.html'">Notifications</button>
                <button class="header-btn" onclick="window.location.href='wallet.html'">Wallet</button>
                <button class="header-btn" onclick="window.location.href='profile.html'">Profile</button>
                <button class="btn btn-primary" onclick="window.location.href='sell.html'" style="margin-left: 1rem; padding: 0.4rem 1.2rem; border-radius: var(--radius-full);">Sell Item</button>
            </div>
        </div>
    </header>
    
    <!-- Main Content -->
    <main class="main-container container">
        <div class="inbox-layout animate-fade-up stagger-1" id="inbox-layout">
            
            <!-- Sidebar -->
            <div class="inbox-sidebar">
                <div class="inbox-search">
                    <input type="text" id="conversation-search" placeholder="Search conversations...">
                </div>
                <div class="inbox-list" id="conversations-list">
                    <div style="padding: 2rem; text-align: center; color: var(--text-muted);">
                        <div class="loading-spinner" style="margin: 0 auto 1rem;"></div>
                        Loading...
                    </div>
                </div>
            </div>

            <!-- Main Chat Window -->
            <div class="chat-main" id="chat-main">
                <div class="empty-chat" id="empty-chat-state">
                    <div style="font-size: 3rem; margin-bottom: 1rem; opacity: 0.5;">💬</div>
                    <h3>Your Messages</h3>
                    <p style="font-size: 0.9rem;">Select a conversation or start a new one to chat with fellow collectors.</p>
                </div>

                <div id="active-chat-state" style="display: none; height: 100%; flex-direction: column;">
                    <div class="chat-header">
                        <button class="back-btn" onclick="window.closeChat()">←</button>
                        <div class="chat-avatar" id="active-chat-avatar">U</div>
                        <div>
                            <h3 style="margin: 0; font-size: 1.1rem; font-family: var(--font-brand);" id="active-chat-name">User Name</h3>
                        </div>
                    </div>
                    
                    <div class="chat-messages" id="chat-messages">
                        <!-- Messages dynamically populated -->
                    </div>

                    <div class="chat-input-area">
                        <textarea id="message-input" placeholder="Type a message..." rows="1"></textarea>
                        <button class="btn btn-primary" onclick="window.sendMessage()">Send</button>
                    </div>
                </div>
            </div>
            
        </div>
    </main>

    <script src="js/notify.js"></script>
    <script src="js/api.js"></script>
    <script src="js/messages.js"></script>
</body>
</html>
