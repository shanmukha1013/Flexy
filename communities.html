<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Communities | FLEXY Collectors</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-subtle);
            padding-bottom: 0.5rem;
        }
        .section-header h3 {
            font-family: var(--font-brand);
            font-size: 1.5rem;
            color: var(--text-primary);
        }
        .communities-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 4rem;
        }
        .community-card {
            background: var(--dark-2);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            transition: all var(--transition-normal);
            cursor: pointer;
        }
        .community-card:hover {
            transform: translateY(-5px);
            border-color: var(--border-glow);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }
        .community-icon-box {
            width: 60px;
            height: 60px;
            border-radius: var(--radius-md);
            background: var(--dark-1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin-bottom: 1rem;
            border: 1px solid var(--border-glass);
        }
    </style>
</head>
<body class="page-fade-in">
    <!-- Header -->
    <header class="app-header">
        <div class="header-container container">
            <div class="logo-section" onclick="window.location.href='home.html'" style="cursor: pointer;">
                <div style="display: flex; align-items: center;">
                    <div class="logo-icon" aria-hidden="true" style="color: var(--primary); width: 32px; height: 32px; margin-right: 0.5rem;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="width: 100%; height: 100%;">
                        <path d="m15 5 4 4" /><path d="m11 9 4 4" /><path d="m13 7-8 8" /><path d="M9 11l-4 4" /><path d="m13 13-7 7" /><path d="M20 20H10" />
                    </svg>
                </div>
                    <h1 class="app-logo">FLEXY</h1>
                </div>
            </div>
            
            <div class="header-actions">
                <button class="header-btn" onclick="window.location.href='home.html'">Home</button>
                <button class="header-btn" onclick="window.location.href='explore.html'">Explore</button>
                <button class="header-btn active" onclick="window.location.href='communities.html'">Communities</button>
                <button class="header-btn" onclick="window.location.href='collections.html'">Collections</button>
                <button class="header-btn" onclick="window.location.href='auctions.html'">Auctions</button>
                <button class="header-btn" onclick="window.location.href='messages.html'">Messages</button>
                <button class="header-btn" id="nav-notifications-btn" onclick="window.location.href='notifications.html'">Notifications</button>
                <button class="header-btn" onclick="window.location.href='wallet.html'">Wallet</button>
                <button class="header-btn" onclick="window.location.href='profile.html'">Profile</button>
                <button class="btn btn-primary" onclick="window.location.href='sell.html'" style="margin-left: 1rem; padding: 0.4rem 1.2rem; border-radius: var(--radius-full);">Sell Item</button>
            </div>
        </div>
    </header>
    
    <!-- Main Content -->
    <main class="main-container container">
        <section style="margin-top: 3rem; text-align: center; border-bottom: 1px solid var(--border-glass); padding-bottom: 3rem; margin-bottom: 3rem;">
            <h2 class="display-title animate-fade-up stagger-1">Communities & Groups</h2>
            <p class="animate-fade-up stagger-2" style="color: var(--text-secondary); max-width: 600px; margin: 1rem auto;">Join high-level communities, participate in specialized groups, and connect with verified collectors worldwide.</p>
            
            <div class="animate-fade-up stagger-3" style="margin-top: 2rem;">
                <div style="max-width: 500px; margin: 0 auto; margin-bottom: 1rem;">
                    <input type="text" id="community-search" placeholder="Search communities..." style="width: 100%; padding: 0.8rem 1.2rem; border-radius: var(--radius-full); background: var(--dark-2); border: 1px solid var(--border-glass); color: var(--text-primary);">
                </div>
                <div style="display: flex; gap: 1rem; justify-content: center;">
                    <button class="btn btn-primary" onclick="window.location.href='create-community.html'" style="border-radius: var(--radius-full); padding: 0.5rem 1.5rem; font-weight: 600;">+ Create Community</button>
                    <button class="btn btn-outline" onclick="window.location.href='create-group.html'" style="border-radius: var(--radius-full); padding: 0.5rem 1.5rem; font-weight: 600;">+ Create Group</button>
                </div>
            </div>
        </section>

        <!-- Dynamic Sections -->
        <section class="animate-fade-up stagger-4" id="my-communities-section" style="display: none;">
            <div class="section-header">
                <h3>🏠 My Communities</h3>
            </div>
            <div id="my-communities-feed" class="communities-grid"></div>
        </section>

        <section class="animate-fade-up stagger-5">
            <div class="section-header">
                <h3>⭐ Featured Communities</h3>
            </div>
            <div id="featured-communities-feed" class="communities-grid"></div>
        </section>

        <section class="animate-fade-up stagger-6">
            <div class="section-header">
                <h3>🌐 Suggested Communities</h3>
            </div>
            <div id="suggested-communities-feed" class="communities-grid"></div>
        </section>
    </main>

    <!-- Create Community Modal -->
    <div class="modal-overlay" id="create-community-modal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 1000; overflow-y: auto; padding: 2rem;">
        <div class="modal-content" style="background: var(--dark-2); border: 1px solid var(--border-glass); border-radius: var(--radius-lg); max-width: 500px; margin: 0 auto; position: relative; padding: 2rem;">
            <button class="close-modal" onclick="document.getElementById('create-community-modal').style.display='none'" style="position: absolute; top: 15px; right: 20px; background: none; border: none; font-size: 1.5rem; color: var(--text-muted); cursor: pointer;">×</button>
            <h2 style="font-family: var(--font-brand); margin-bottom: 1.5rem;">Create Community</h2>
            <form id="create-community-form">
                <div class="form-group" style="margin-bottom: 1rem;">
                    <label>Community Name *</label>
                    <input type="text" id="new-comm-name" required placeholder="e.g. Ancient Coin Collectors">
                </div>
                <div class="form-group" style="margin-bottom: 1rem;">
                    <label>Description *</label>
                    <textarea id="new-comm-desc" required rows="3" placeholder="What is this community about?"></textarea>
                </div>
                <div class="form-group" style="margin-bottom: 1rem;">
                    <label>Icon Emoji</label>
                    <input type="text" id="new-comm-icon" placeholder="🏛️" maxlength="2" style="width: 80px; text-align: center;">
                </div>
                <button type="submit" class="btn btn-primary btn-block">Create Community</button>
            </form>
        </div>
    </div>

    <script src="js/notify.js"></script>
    <script src="js/api.js"></script>
    <script src="js/communities.js"></script>
</body>
</html>
