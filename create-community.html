<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexy - Create Community</title>
    <link rel="stylesheet" href="css/index.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="page-fade-in">
    <!-- Header -->
    <header class="app-header">
        <div class="header-container container">
            <div class="logo-section" onclick="window.location.href='home.html'" style="cursor: pointer;">
                <h1 class="app-logo">FLEXY</h1>
            </div>
            
            <div class="header-actions">
                <button class="header-btn" onclick="window.location.href='home.html'">Home</button>
                <button class="header-btn active" onclick="window.location.href='communities.html'">Communities</button>
                <button class="header-btn" onclick="window.location.href='profile.html'">Profile</button>
                <button class="btn btn-primary" onclick="window.location.href='sell.html'" style="margin-left: 1rem; border-radius: var(--radius-full); padding: 0.4rem 1.2rem;">Sell Item</button>
            </div>
        </div>
    </header>

    <main class="main-container container" style="max-width: 600px; padding-top: 4rem;">
        <div class="glass-card animate-fade-up" style="padding: 2.5rem;">
            <h2 style="font-family: var(--font-brand); margin-bottom: 0.5rem;">Create a Community</h2>
            <p style="color: var(--text-secondary); margin-bottom: 2rem;">A community is an umbrella that holds specialized groups. Create the community first, then you can add specific groups inside it.</p>
            
            <div class="form-group">
                <label>Community Name</label>
                <input type="text" id="comm-name" placeholder="e.g., Global Numismatics Hub" required>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="comm-desc" rows="4" placeholder="What is this community about?" required></textarea>
            </div>
            <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem;">
                <div class="form-group" style="flex: 1;">
                    <label>Emoji Icon</label>
                    <input type="text" id="comm-icon" placeholder="🏛️" value="🏛️">
                </div>
                <div class="form-group" style="flex: 2;">
                    <label>Privacy</label>
                    <select id="comm-privacy" style="width: 100%; padding: 0.8rem; border-radius: var(--radius-sm); border: 1px solid var(--border-glass); background: var(--dark-1); color: var(--text-primary);">
                        <option value="public">Public (Anyone can join)</option>
                        <option value="private">Private (Invite / Request only)</option>
                    </select>
                </div>
            </div>

            <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 2rem;">
                <button class="btn btn-outline" onclick="window.location.href='communities.html'">Cancel</button>
                <button class="btn btn-primary" id="create-btn" onclick="createCommunity()">Create Community</button>
            </div>
        </div>
    </main>

    <div id="toast-container"></div>
    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = localStorage.getItem('flexy_user');
            if (!user) window.location.href = 'login.html';
        });

        async function createCommunity() {
            const name = document.getElementById('comm-name').value.trim();
            const desc = document.getElementById('comm-desc').value.trim();
            const icon = document.getElementById('comm-icon').value.trim() || '🏛️';
            const privacy = document.getElementById('comm-privacy').value;

            if (!name || !desc) {
                notify('Name and Description are required.', 'warning');
                return;
            }

            const btn = document.getElementById('create-btn');
            btn.disabled = true;
            btn.innerText = 'Creating...';

            try {
                const res = await api.post('/communities', {
                    name,
                    description: desc,
                    icon,
                    privacy
                });
                notify('Community created! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = `community.html?id=${res._id}`;
                }, 1500);
            } catch (err) {
                notify(err.message, 'error');
                btn.disabled = false;
                btn.innerText = 'Create Community';
            }
        }
    </script>
</body>
</html>
