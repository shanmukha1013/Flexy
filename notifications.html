<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLEXY | Notification Center</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        .notification-card {
            display: flex;
            gap: 1rem;
            align-items: flex-start;
            padding: 1.25rem;
            margin-bottom: 1rem;
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-md);
            background: rgba(255, 255, 255, 0.03);
            transition: all 0.3s ease;
        }
        .notification-card.unread {
            background: rgba(15, 157, 122, 0.06);
            border-left: 3px solid var(--primary);
        }
        .notification-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            background: rgba(255, 255, 255, 0.05);
        }
        .notification-icon {
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--dark-2);
            flex-shrink: 0;
        }
        .notification-content {
            flex: 1;
            text-align: left;
        }
        .notification-title {
            font-weight: 700;
            font-size: 1rem;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }
        .notification-msg {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.4;
            margin-bottom: 0.5rem;
        }
        .notification-time {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .action-buttons {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.75rem;
        }
        .empty-state {
            padding: 4rem 2rem;
            text-align: center;
            color: var(--text-muted);
        }
        .empty-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }
    </style>
</head>
<body class="page-fade-in">
    <!-- Header -->
    <header class="app-header">
        <div class="header-container container">
            <div class="logo-section" onclick="window.location.href='home.html'" style="cursor: pointer;">
                <div style="display: flex; align-items: center;">
                    <div class="logo-icon" aria-hidden="true" style="color: var(--primary); width: 32px; height: 32px; margin-right: 0.5rem;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="width: 100%; height: 100%;">
                            <path d="m15 5 4 4" />
                            <path d="m11 9 4 4" />
                            <path d="m13 7-8 8" />
                            <path d="M9 11l-4 4" />
                            <path d="m13 13-7 7" />
                            <path d="M20 20H10" />
                        </svg>
                    </div>
                    <h1 class="app-logo">FLEXY</h1>
                </div>
            </div>
            
            <div class="header-actions">
                <button class="header-btn" onclick="window.location.href='home.html'">Home</button>
                <button class="header-btn" onclick="window.location.href='explore.html'">Explore</button>
                <button class="header-btn" onclick="window.location.href='communities.html'">Communities</button>
                <button class="header-btn" onclick="window.location.href='collections.html'">Collections</button>
                <button class="header-btn" onclick="window.location.href='auctions.html'">Auctions</button>
                <button class="header-btn" onclick="window.location.href='messages.html'">Messages</button>
                <button class="header-btn active" id="nav-notifications-btn" onclick="window.location.href='notifications.html'">Notifications <span class="notification-badge" id="nav-notification-badge" style="display: none; background: #EF4444; color: white; border-radius: 50%; padding: 0.15rem 0.4rem; font-size: 0.7rem; font-weight: bold; margin-left: 0.3rem;">0</span></button>
                <button class="header-btn" onclick="window.location.href='wallet.html'">Wallet</button>
                <button class="header-btn" onclick="window.location.href='profile.html'">Profile</button>
            </div>
        </div>
    </header>
    
    <!-- Main Content -->
    <main class="main-container container" style="display: grid; grid-template-columns: 280px 1fr 320px; gap: 2rem; margin-top: 2rem;">
        
        <!-- Left Sidebar: Navigation & Profile -->
        <aside class="animate-fade-up stagger-1">
            <div class="glass-card" style="padding: 1.5rem; margin-bottom: 1.5rem;">
                <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; cursor: pointer;" onclick="window.location.href='profile.html'">
                    <div class="avatar-circle" id="sidebar-avatar" style="width: 50px; height: 50px; background: var(--primary);">U</div>
                    <div>
                        <div id="sidebar-displayname" style="font-weight: 700; font-family: var(--font-brand);">User Name</div>
                        <div id="sidebar-username" style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 0.2rem;">@UserCollector</div>
                        <div id="sidebar-reputation" style="font-size: 0.8rem; color: var(--text-muted);">Reputation: Elite</div>
                    </div>
                </div>
                <div style="display: flex; flex-direction: column; gap: 0.8rem;">
                    <a href="home.html" style="text-decoration: none; color: var(--text-secondary); display: flex; align-items: center; gap: 0.5rem;"><svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle;"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg> Home Feed</a>
                    <a href="explore.html" style="text-decoration: none; color: var(--text-secondary); display: flex; align-items: center; gap: 0.5rem;"><svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle;"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg> Explore</a>
                    <a href="collections.html" style="text-decoration: none; color: var(--text-secondary); display: flex; align-items: center; gap: 0.5rem;"><svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle;"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="12" y1="3" x2="12" y2="21"></line></svg> My Museum</a>
                    <a href="auctions.html" style="text-decoration: none; color: var(--text-secondary); display: flex; align-items: center; gap: 0.5rem;">⚖️ My Bids</a>
                </div>
            </div>

            <div class="glass-card" style="padding: 1.5rem;">
                <h4 style="margin: 0 0 1rem 0; font-family: var(--font-brand); font-weight: 500; color: var(--text-secondary); font-size: 1.1rem; letter-spacing: 0.5px;">My Communities</h4>
                <div id="sidebar-communities-list" style="display: flex; flex-direction: column; gap: 1rem;">
                    <p style="font-size: 0.85rem; color: var(--text-muted);">No joined communities yet.</p>
                </div>
            </div>
        </aside>
        
        <!-- Center: Notifications List -->
        <section class="animate-fade-up stagger-2">
            <div class="glass-card" style="padding: 1.5rem; margin-bottom: 2rem;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <h2 style="font-family: var(--font-brand); margin: 0; font-weight: 500; letter-spacing: 0.5px;">Notification Center</h2>
                    <button class="btn btn-outline" id="mark-all-read-btn" style="padding: 0.4rem 1rem; font-size: 0.85rem;">Mark All as Read</button>
                </div>
                
                <div id="notifications-list-container">
                    <!-- Loaded dynamically -->
                    <div style="text-align: center; padding: 3rem;">
                        <div class="loading-spinner" style="margin: 0 auto 1rem;"></div>
                        <p style="color: var(--text-muted);">Retrieving alerts...</p>
                    </div>
                </div>
            </div>
        </section>
        
        <!-- Right Sidebar: Collectors to Follow -->
        <aside class="animate-fade-up stagger-3">
            <div class="glass-card" style="padding: 1.5rem;">
                <h4 style="margin: 0 0 1rem 0; font-family: var(--font-brand); font-weight: 500; color: var(--text-secondary); font-size: 1.1rem; letter-spacing: 0.5px;">Collectors to Follow</h4>
                <div id="collectors-to-follow-container" style="display: flex; flex-direction: column; gap: 1rem;">
                    <p style="font-size: 0.85rem; color: var(--text-muted);">Retrieving suggestions...</p>
                </div>
            </div>
        </aside>
        
    </main>

    <script src="js/notify.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/notifications.js"></script>
</body>
</html>
