<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Museum | FLEXY Collectors</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        .museum-hero {
            text-align: center;
            padding: 4rem 2rem;
            border-bottom: 1px solid var(--border-glass);
            background: linear-gradient(180deg, var(--dark-1) 0%, var(--dark-0) 100%);
        }
        .museum-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }
    </style>
</head>
<body class="page-fade-in">
    <!-- Header -->
    <header class="app-header">
        <div class="header-container container">
            <div class="logo-section" onclick="window.location.href='home.html'" style="cursor: pointer;">
                <div style="display: flex; align-items: center;">
                    <div class="logo-icon" aria-hidden="true" style="color: var(--primary); width: 32px; height: 32px; margin-right: 0.5rem;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="width: 100%; height: 100%;">
                            <path d="m15 5 4 4" />
                            <path d="m11 9 4 4" />
                            <path d="m13 7-8 8" />
                            <path d="M9 11l-4 4" />
                            <path d="m13 13-7 7" />
                            <path d="M20 20H10" />
                        </svg>
                    </div>
                    <h1 class="app-logo">FLEXY</h1>
                </div>
            </div>
            
            <div class="header-actions">
                <button class="header-btn" onclick="window.location.href='home.html'">Home</button>
                <button class="header-btn" onclick="window.location.href='explore.html'">Explore</button>
                <button class="header-btn" onclick="window.location.href='communities.html'">Communities</button>
                <button class="header-btn" onclick="window.location.href='collections.html'">Collections</button>
                <button class="header-btn active" onclick="window.location.href='museum.html'">Museum</button>
                <button class="header-btn" onclick="window.location.href='auctions.html'">Auctions</button>
                <button class="header-btn" onclick="window.location.href='messages.html'">Messages</button>
                <button class="header-btn" id="nav-notifications-btn" onclick="window.location.href='notifications.html'">Notifications</button>
                <button class="header-btn" onclick="window.location.href='wallet.html'">Wallet</button>
                <button class="header-btn" onclick="window.location.href='profile.html'">Profile</button>
                <button class="btn btn-primary" onclick="window.location.href='sell.html'" style="margin-left: 1rem; padding: 0.4rem 1.2rem; border-radius: var(--radius-full);">Sell Item</button>
            </div>
        </div>
    </header>
    
    <!-- Main Content -->
    <main>
        <section class="museum-hero animate-fade-up stagger-1">
            <h2 class="display-title">The Museum</h2>
            <p style="color: var(--text-secondary); max-width: 600px; margin: 1rem auto;">A curated exhibition of the world's most unique collections. No auctions, no selling—just pure appreciation of history and art.</p>
        </section>

        <section class="container animate-fade-up stagger-2" style="margin-top: 3rem; margin-bottom: 5rem;">
            <!-- Categories / Rooms -->
            <div style="display: flex; gap: 1rem; border-bottom: 1px solid var(--border-subtle); padding-bottom: 1rem; overflow-x: auto;">
                <button class="btn btn-outline" style="border-color: var(--primary); color: var(--text-primary);">All Artifacts</button>
                <button class="btn btn-outline">Antiquities</button>
                <button class="btn btn-outline">Horology</button>
                <button class="btn btn-outline">Fine Art</button>
                <button class="btn btn-outline">Numismatics</button>
            </div>

            <!-- Empty State for Museum -->
            <div id="museum-gallery" class="museum-gallery">
                <div class="no-results" style="grid-column: 1 / -1; padding: 5rem 2rem; text-align: center;">
                    <div class="empty-state">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" style="margin-bottom: 1rem;">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2" stroke="var(--text-muted)" stroke-width="2"/>
                            <circle cx="8.5" cy="8.5" r="1.5" fill="var(--text-muted)"/>
                            <polyline points="21 15 16 10 5 21" stroke="var(--text-muted)" stroke-width="2"/>
                        </svg>
                        <h4 style="font-size: 1.25rem;">No artifacts on display yet</h4>
                        <p style="color: var(--text-secondary); margin-top: 0.25rem;">Curators are currently preparing the exhibition halls.</p>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script src="js/notify.js"></script>
    <script src="js/api.js"></script>
</body>
</html>
