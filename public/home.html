<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLEXY | The Social Network for Collectors</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body class="page-fade-in">
    <!-- Header -->
    <header class="app-header">
        <div class="header-container container">
            <div class="logo-section" onclick="window.location.href='home.html'" style="cursor: pointer;">
                <div style="display: flex; align-items: center;">
                    <div class="logo-icon" aria-hidden="true" style="color: var(--primary); width: 32px; height: 32px; margin-right: 0.5rem;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="width: 100%; height: 100%;"><path d="m15 5 4 4" /><path d="m11 9 4 4" /><path d="m13 7-8 8" /><path d="M9 11l-4 4" /><path d="m13 13-7 7" /><path d="M20 20H10" /></svg>
                    </div>
                    <h1 class="app-logo">FLEXY</h1>
                </div>
            </div>
            
            <div class="header-actions">
                <button class="header-btn active" onclick="window.location.href='home.html'">Home</button>
                <button class="header-btn" onclick="window.location.href='explore.html'">Explore</button>
                <button class="header-btn" onclick="window.location.href='communities.html'">Communities</button>
                <button class="header-btn" onclick="window.location.href='collections.html'">Collections</button>
                <button class="header-btn" onclick="window.location.href='museum.html'">Museum</button>
                <button class="header-btn" onclick="window.location.href='auctions.html'">Auctions</button>
                <button class="header-btn" onclick="window.location.href='messages.html'">Messages</button>
                <button class="header-btn" id="nav-notifications-btn" onclick="window.location.href='notifications.html'">Notifications</button>
                <button class="header-btn" onclick="window.location.href='wallet.html'">Wallet</button>
                <button class="header-btn" onclick="window.location.href='profile.html'">Profile</button>
                <button class="btn btn-primary" onclick="window.location.href='sell.html'" style="margin-left: 1rem; padding: 0.4rem 1.2rem; border-radius: var(--radius-full);">Sell Item</button>
            </div>
        </div>
    </header>
    
    <!-- Main Content -->
    <main class="main-container container" style="display: grid; grid-template-columns: 280px 1fr 320px; gap: 2rem; margin-top: 2rem; padding-bottom: 4rem;">
        
        <!-- Left Sidebar: Navigation & Communities -->
        <aside class="animate-fade-up stagger-1">
            <div class="glass-card" style="padding: 1.5rem; margin-bottom: 1.5rem;">
                <div id="sidebar-user-info" style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; cursor: pointer;" onclick="window.location.href='profile.html'">
                    <!-- Populated by JS -->
                </div>
                <div style="display: flex; flex-direction: column; gap: 0.8rem;">
                    <a href="home.html" style="text-decoration: none; color: var(--primary); font-weight: 600; display: flex; align-items: center; gap: 0.5rem;"><svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle;"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg> Home Feed</a>
                    <a href="search.html" style="text-decoration: none; color: var(--text-secondary); display: flex; align-items: center; gap: 0.5rem;"><svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle;"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg> Search</a>
                    <a href="collections.html" style="text-decoration: none; color: var(--text-secondary); display: flex; align-items: center; gap: 0.5rem;"><svg width="1em" height="1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle;"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="12" y1="3" x2="12" y2="21"></line></svg> Collections</a>
                </div>
            </div>

            <div class="glass-card" style="padding: 1.5rem;">
                <h4 style="margin: 0 0 1rem 0; font-family: var(--font-brand); font-weight: 500; color: var(--text-secondary); font-size: 1.1rem; letter-spacing: 0.5px;">My Communities</h4>
                <div id="sidebar-communities" style="display: flex; flex-direction: column; gap: 1rem;">
                    <!-- Populated by JS -->
                </div>
            </div>
        </aside>

        <!-- Center: Discovery Hub Feed -->
        <section class="animate-fade-up stagger-2" style="display: flex; flex-direction: column; gap: 2rem;">
            
            <div>
                <h2 style="font-family: var(--font-brand); margin-bottom: 1rem;">Live Auctions</h2>
                <div id="feed-live-auctions" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1.5rem;"></div>
            </div>

            <div>
                <h2 style="font-family: var(--font-brand); margin-bottom: 1rem;">Ending Soon</h2>
                <div id="feed-ending-auctions" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1.5rem;"></div>
            </div>

            <div>
                <h2 style="font-family: var(--font-brand); margin-bottom: 1rem;">Recently Created Collections</h2>
                <div id="feed-recent-collections" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1.5rem;"></div>
            </div>

            <div>
                <h2 style="font-family: var(--font-brand); margin-bottom: 1rem;">Community Activity</h2>
                <div id="feed-community-activity"></div>
            </div>
        </section>

        <!-- Right Sidebar: Trending & Suggestions -->
        <aside class="animate-fade-up stagger-3" style="display: flex; flex-direction: column; gap: 1.5rem;">
            <div class="glass-card" style="padding: 1.5rem;">
                <h4 style="margin: 0 0 1rem 0; font-family: var(--font-brand); font-weight: 500; color: var(--text-secondary); font-size: 1.1rem; letter-spacing: 0.5px;">Trending Collections</h4>
                <div id="sidebar-trending-collections" style="display: flex; flex-direction: column; gap: 1rem;"></div>
            </div>

            <div class="glass-card" style="padding: 1.5rem;">
                <h4 style="margin: 0 0 1rem 0; font-family: var(--font-brand); font-weight: 500; color: var(--text-secondary); font-size: 1.1rem; letter-spacing: 0.5px;">Featured Collectors</h4>
                <div id="sidebar-featured-collectors" style="display: flex; flex-direction: column; gap: 1rem;"></div>
            </div>

            <div class="glass-card" style="padding: 1.5rem;">
                <h4 style="margin: 0 0 1rem 0; font-family: var(--font-brand); font-weight: 500; color: var(--text-secondary); font-size: 1.1rem; letter-spacing: 0.5px;">New Collectors</h4>
                <div id="sidebar-new-collectors" style="display: flex; flex-direction: column; gap: 1rem;"></div>
            </div>
        </aside>

    </main>
    <script src="js/notify.js"></script>
    <script src="js/api.js"></script>
    <script src="js/home.js"></script>
</body>
</html>
