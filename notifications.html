<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notification Center | FLEXY</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        .notifications-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 2rem;
            margin-top: 2rem;
            padding-bottom: 4rem;
        }
        @media (max-width: 900px) {
            .notifications-layout {
                grid-template-columns: 1fr;
            }
        }
        .notifications-sidebar {
            position: sticky;
            top: 88px;
            height: fit-content;
        }
        
        .tab-menu {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            text-align: left;
            padding: 0.8rem 1rem;
            border-radius: var(--radius-sm);
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-fast);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .tab-btn:hover {
            background: var(--dark-2);
            color: var(--text-primary);
        }
        .tab-btn.active {
            background: rgba(15, 157, 122, 0.1);
            color: var(--primary);
            font-weight: 600;
        }
        .badge {
            background: var(--primary);
            color: var(--black);
            font-size: 0.75rem;
            font-weight: 700;
            padding: 0.1rem 0.5rem;
            border-radius: var(--radius-full);
            display: none;
        }
        .badge.active {
            display: inline-block;
        }

        .notification-card {
            display: flex;
            gap: 1.2rem;
            align-items: flex-start;
            padding: 1.5rem;
            margin-bottom: 1rem;
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-md);
            background: var(--dark-2);
            transition: all var(--transition-fast);
        }
        .notification-card.unread {
            background: rgba(15, 157, 122, 0.05);
            border-left: 4px solid var(--primary);
        }
        .notification-card:hover {
            transform: translateY(-2px);
            border-color: var(--primary);
        }
        
        .sender-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-color: var(--dark-1);
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 700;
            border: 2px solid var(--border-glass);
            flex-shrink: 0;
        }
        
        .notification-content {
            flex: 1;
        }
        .notification-title {
            font-family: var(--font-brand);
            font-size: 1.1rem;
            color: var(--text-primary);
            margin: 0 0 0.3rem 0;
        }
        .notification-msg {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.5;
            margin: 0 0 0.8rem 0;
        }
        .notification-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .notification-time {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        
        .empty-state {
            padding: 5rem 2rem;
            text-align: center;
            border-radius: var(--radius-lg);
            border: 1px dashed var(--border-glass);
            background: rgba(255,255,255,0.02);
        }
    </style>
</head>
<body class="page-fade-in">
    <!-- Header -->
    <header class="app-header">
        <div class="header-container container">
            <div class="logo-section" onclick="window.location.href='home.html'" style="cursor: pointer;">
                <div style="display: flex; align-items: center;">
                    <div class="logo-icon" aria-hidden="true" style="color: var(--primary); width: 32px; height: 32px; margin-right: 0.5rem;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="width: 100%; height: 100%;">
                            <path d="m15 5 4 4" /><path d="m11 9 4 4" /><path d="m13 7-8 8" /><path d="M9 11l-4 4" /><path d="m13 13-7 7" /><path d="M20 20H10" />
                        </svg>
                    </div>
                    <h1 class="app-logo">FLEXY</h1>
                </div>
            </div>
            
            <div class="header-actions">
                <button class="header-btn" onclick="window.location.href='home.html'">Home</button>
                <button class="header-btn" onclick="window.location.href='explore.html'">Explore</button>
                <button class="header-btn" onclick="window.location.href='communities.html'">Communities</button>
                <button class="header-btn" onclick="window.location.href='collections.html'">Collections</button>
                <button class="header-btn" onclick="window.location.href='auctions.html'">Auctions</button>
                <button class="header-btn" onclick="window.location.href='messages.html'">Messages</button>
                <button class="header-btn active" onclick="window.location.href='notifications.html'">Notifications</button>
                <button class="header-btn" onclick="window.location.href='wallet.html'">Wallet</button>
                <button class="header-btn" onclick="window.location.href='profile.html'">Profile</button>
                <button class="btn btn-primary" onclick="window.location.href='sell.html'" style="margin-left: 1rem; border-radius: var(--radius-full); padding: 0.4rem 1.2rem;">Sell Item</button>
            </div>
        </div>
    </header>

    <main class="main-container container">
        <div class="page-header animate-fade-up stagger-1" style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 2rem;">
            <div>
                <h2 class="display-title" style="margin: 0; font-size: 2.2rem;">Notifications</h2>
                <p style="color: var(--text-secondary); margin: 0.5rem 0 0 0;">Stay updated on your auctions, communities, and collections.</p>
            </div>
            <button class="btn btn-outline" id="mark-all-read-btn" style="border-radius: var(--radius-full);">Mark all as read</button>
        </div>

        <div class="notifications-layout">
            
            <!-- Sidebar Navigation -->
            <div class="notifications-sidebar animate-fade-up stagger-2">
                <div class="glass-card" style="padding: 1rem;">
                    <div class="tab-menu">
                        <button class="tab-btn active" data-tab="all" onclick="notifApp.switchTab('all')">
                            All Notifications <span class="badge" id="badge-all">0</span>
                        </button>
                        <button class="tab-btn" data-tab="unread" onclick="notifApp.switchTab('unread')">
                            Unread <span class="badge" id="badge-unread">0</span>
                        </button>
                        <hr style="border: 0; border-top: 1px solid var(--border-glass); margin: 0.5rem 0;">
                        <button class="tab-btn" data-tab="auctions" onclick="notifApp.switchTab('auctions')">
                            Auctions
                        </button>
                        <button class="tab-btn" data-tab="communities" onclick="notifApp.switchTab('communities')">
                            Communities
                        </button>
                        <button class="tab-btn" data-tab="collections" onclick="notifApp.switchTab('collections')">
                            Collections
                        </button>
                        <button class="tab-btn" data-tab="system" onclick="notifApp.switchTab('system')">
                            System
                        </button>
                    </div>
                </div>
            </div>

            <!-- Feed -->
            <div class="notifications-feed animate-fade-up stagger-3" id="notifications-feed">
                <!-- Loaded by JS -->
            </div>

        </div>
    </main>

    <script src="js/notify.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/notifications.js"></script>
</body>
</html>
