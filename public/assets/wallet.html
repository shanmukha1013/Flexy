<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <title>FLEXY - Wallet</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Header -->
    <header class="app-header">
        <div class="header-container container">
            <div class="logo-section">
                <button class="back-btn" onclick="window.location.href='home.html'">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <path d="M19 12H5M5 12L12 19M5 12L12 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <div class="logo-icon" aria-hidden="true"><img src="assets/hammer.svg" alt="Hammer logo"></div>
                <h1 class="app-logo">Wallet</h1>
            </div>
            
            <div class="header-actions">
                <button class="header-btn" onclick="showTransactions()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                        <path d="M12 8V12L15 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/>
                    </svg>
                    <span>History</span>
                </button>
            </div>
        </div>
    </header>
    
    <!-- Main Content -->
    <main class="main-container container">
        <!-- Balance Card -->
        <section class="balance-section">
            <div class="balance-card card">
                <div class="balance-header">
                    <h3>Available Balance</h3>
                    <button class="btn-icon" onclick="refreshBalance()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                            <path d="M23 4V10H17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M1 20V14H7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M3.51 9C4.01717 7.56678 4.87913 6.2854 6.01547 5.27542C7.1518 4.26543 8.52547 3.55976 10.0083 3.22426C11.4911 2.88875 13.0348 2.93434 14.4952 3.35677C15.9556 3.77921 17.2853 4.56471 18.36 5.64L23 10M1 14L5.64 18.36C6.71475 19.4353 8.04437 20.2208 9.50481 20.6432C10.9652 21.0657 12.5089 21.1113 13.9917 20.7757C15.4745 20.4402 16.8482 19.7346 17.9845 18.7246C19.1209 17.7146 19.9828 16.4332 20.49 15" 
                                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
                <div class="balance-amount" id="balance-amount">₹0</div>
                <div class="balance-subtext">For purchases and bids</div>
                <div class="balance-reserved muted" id="reserved-amount">Reserved for bids: ₹0</div>
            </div>
        </section>
        
        <!-- Quick Actions -->
        <section class="actions-section">
            <h3>Quick Actions</h3>
            <div class="actions-grid">
                <button class="action-card" onclick="addMoney()">
                    <div class="action-icon add-money">+</div>
                    <div class="action-label">Add Money</div>
                </button>
                <button class="action-card" onclick="withdrawMoney()">
                    <div class="action-icon withdraw">→</div>
                    <div class="action-label">Withdraw</div>
                </button>
                <button class="action-card" onclick="sendMoney()">
                    <div class="action-icon send">↑</div>
                    <div class="action-label">Send</div>
                </button>
                <button class="action-card" onclick="viewCards()">
                    <div class="action-icon cards">💳</div>
                    <div class="action-label">Cards</div>
                </button>
            </div>
        </section>
        
        <!-- Recent Transactions -->
        <section class="transactions-section">
            <div class="section-header">
                <h3>Recent Transactions</h3>
                <a href="#" class="view-all" onclick="showAllTransactions()">View All</a>
            </div>
            
            <div class="transactions-list" id="transactions-list">
                <!-- Transactions will be loaded here -->
            </div>
            
            <div class="empty-state" id="empty-transactions" style="display: none;">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none">
                    <path d="M12 8V12L15 15" stroke="#D1D5DB" stroke-width="2" stroke-linecap="round"/>
                    <circle cx="12" cy="12" r="9" stroke="#D1D5DB" stroke-width="2"/>
                </svg>
                <h4>No transactions yet</h4>
                <p>Your transaction history will appear here</p>
            </div>
        </section>
    </main>
    
    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="home.html" class="nav-item">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M3 9L12 2L21 9V20C21 20.5304 20.7893 21.0391 20.4142 21.4142C20.0391 21.7893 19.5304 22 19 22H5C4.46957 22 3.96086 21.7893 3.58579 21.4142C3.21071 21.0391 3 20.5304 3 20V9Z" 
                      stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>Home</span>
        </a>
        <a href="search.html" class="nav-item">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M21 21L15 15M17 10C17 13.866 13.866 17 10 17C6.13401 17 3 13.866 3 10C3 6.13401 6.13401 3 10 3C13.866 3 17 6.13401 17 10Z" 
                      stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <span>Search</span>
        </a>
        <a href="sell.html" class="nav-item">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <span>Sell</span>
        </a>
        <a href="wallet.html" class="nav-item active">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M21 12C21 16.9706 16.9706 21 12 21C7.02944 21 3 16.9706 3 12C3 7.02944 7.02944 3 12 3C16.9706 3 21 7.02944 21 12Z" 
                      stroke="currentColor" stroke-width="2"/>
                <path d="M15 8H9V16H15V8Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            </svg>
            <span>Wallet</span>
        </a>
        <a href="profile.html" class="nav-item">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M20 21V19C20 16.7909 18.2091 15 16 15H8C5.79086 15 4 16.7909 4 19V21" 
                      stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="2"/>
            </svg>
            <span>Profile</span>
        </a>
    </nav>
    
    <!-- Add Money Modal -->
    <div id="add-money-modal" class="modal" role="dialog" aria-modal="true" aria-hidden="true">
        <div tabindex="0" class="focus-sentinel" id="modal-focus-start"></div>
        <div class="modal-content" role="document">
            <div class="modal-header">
                <h3>Add Money <span class="modal-state badge" id="modal-state" aria-hidden="true"></span></h3>
                <button type="button" class="close-modal" aria-label="Close">&times;</button>
            </div>
            <div class="modal-body">
                <form id="add-money-form" novalidate>
                        <div id="modal-announce" class="sr-only" role="status" aria-live="assertive"></div>
                    <div class="form-group">
                        <label for="add-amount">Amount (₹)</label>
                        <input type="number" 
                               id="add-amount" 
                               aria-describedby="add-amount-error"
                               aria-invalid="false"
                               placeholder="Enter amount"
                               min="100"
                               max="100000">
                        <div id="add-amount-error" class="field-error" aria-live="polite"></div>
                    </div>
                
                <div class="amount-presets">
                    <h4>Quick Select</h4>
                    <div class="preset-grid">
                        <button type="button" class="preset-amount" data-amount="100">₹100</button>
                        <button type="button" class="preset-amount" data-amount="500">₹500</button>
                        <button type="button" class="preset-amount" data-amount="1000">₹1,000</button>
                        <button type="button" class="preset-amount" data-amount="2000">₹2,000</button>
                        <button type="button" class="preset-amount" data-amount="5000">₹5,000</button>
                        <button type="button" class="preset-amount" data-amount="10000">₹10,000</button>
                    </div>
                </div>
                
                <div class="payment-methods">
                    <h4>Payment Method</h4>
                    <div class="method-options">
                        <label class="method-option">
                            <input type="radio" name="payment-method" value="upi" checked>
                            <div class="method-card">
                                <div class="method-icon">📱</div>
                                <div>
                                    <div class="method-title">UPI</div>
                                    <div class="method-desc">Instant payment</div>
                                </div>
                            </div>
                        </label>
                        <label class="method-option">
                            <input type="radio" name="payment-method" value="card">
                            <div class="method-card">
                                <div class="method-icon">💳</div>
                                <div>
                                    <div class="method-title">Card</div>
                                    <div class="method-desc">Credit/Debit Card</div>
                                </div>
                            </div>
                        </label>
                        <label class="method-option">
                            <input type="radio" name="payment-method" value="netbanking">
                            <div class="method-card">
                                <div class="method-icon">🏦</div>
                                <div>
                                    <div class="method-title">Net Banking</div>
                                    <div class="method-desc">Bank Transfer</div>
                                </div>
                            </div>
                        </label>
                    </div>
                    <div id="payment-method-error" class="field-error" aria-live="polite"></div>
                </div>
                
                <button id="add-money-btn" type="button" class="btn btn-primary btn-block">
                    Add Money
                </button>
                </form>
            </div>
        </div>
        <div tabindex="0" class="focus-sentinel" id="modal-focus-end"></div>
    </div>

    <div id="modal-overlay" class="overlay" aria-hidden="true"></div>

    <!-- Transactions Modal -->
    <div id="transactions-modal" class="modal" role="dialog" aria-modal="true" aria-hidden="true">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Transactions</h3>
                <button type="button" class="close-modal" aria-label="Close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="transactions-modal-list" id="transactions-modal-list"></div>
            </div>
            <div class="modal-actions">
                <button class="btn btn-outline" onclick="wallet.exportTransactions('json')">Export JSON</button>
                <button class="btn btn-outline" onclick="wallet.exportTransactions('csv')">Export CSV</button>
            </div>
        </div>
    </div>
    
    <script src="js/notify.js"></script>
    <script src="js/wallet.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
