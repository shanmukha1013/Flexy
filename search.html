<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search | FLEXY Collectors</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        .search-results-section {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 2.5rem;
            align-items: start;
            margin-top: 2rem;
            margin-bottom: 4rem;
        }
        @media(max-width:992px) {
            .search-results-section {
                grid-template-columns: 1fr;
            }
            .filters-panel {
                display: none;
                position: fixed;
                top: 72px;
                left: 0;
                width: 100vw;
                height: calc(100vh - 72px);
                z-index: 90;
                background: var(--dark-0);
                padding: 2rem;
                overflow-y: auto;
            }
            .filters-panel.active {
                display: block;
            }
        }
        
        .filters-panel {
            background: var(--dark-1);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            padding: 1.75rem;
            position: sticky;
            top: 92px;
        }
        
        .filter-section {
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border-subtle);
            padding-bottom: 1.5rem;
        }
        .filter-section h4 {
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 1rem;
        }
        .filter-radio {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            margin-bottom: 0.75rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
            transition: color var(--transition-fast);
        }
        .filter-radio:hover {
            color: var(--text-primary);
        }
        
        .search-header-container {
            display: flex;
            background: var(--dark-2);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-full);
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            align-items: center;
            padding: 0 1rem;
            position: relative;
        }
        .search-header-container input {
            border: none !important;
            background: transparent !important;
            padding: 0.8rem 0.5rem;
            color: var(--text-primary);
            flex: 1;
            font-size: 1rem;
        }
        .search-header-container input:focus {
            outline: none;
            box-shadow: none !important;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1.5rem;
        }
    </style>
</head>
<body class="page-fade-in">
    <!-- Header -->
    <header class="app-header">
        <div class="header-container container">
            <div class="logo-section" onclick="window.location.href='home.html'" style="cursor: pointer;">
                <div style="display: flex; align-items: center;">
                    <div class="logo-icon" aria-hidden="true" style="color: var(--primary); width: 32px; height: 32px; margin-right: 0.5rem;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="width: 100%; height: 100%;"><path d="m15 5 4 4" /><path d="m11 9 4 4" /><path d="m13 7-8 8" /><path d="M9 11l-4 4" /><path d="m13 13-7 7" /><path d="M20 20H10" /></svg>
                    </div>
                    <h1 class="app-logo">FLEXY</h1>
                </div>
            </div>
            
            <div class="header-actions">
                <button class="header-btn" onclick="window.location.href='home.html'">Home</button>
                <button class="header-btn" onclick="window.location.href='explore.html'">Explore</button>
                <button class="header-btn" onclick="window.location.href='communities.html'">Communities</button>
                <button class="header-btn" onclick="window.location.href='collections.html'">Collections</button>
                <button class="header-btn" onclick="window.location.href='auctions.html'">Auctions</button>
                <button class="header-btn" onclick="window.location.href='messages.html'">Messages</button>
                <button class="header-btn" id="nav-notifications-btn" onclick="window.location.href='notifications.html'">Notifications</button>
                <button class="header-btn" onclick="window.location.href='wallet.html'">Wallet</button>
                <button class="header-btn" onclick="window.location.href='profile.html'">Profile</button>
                <button class="btn btn-primary" onclick="window.location.href='sell.html'" style="margin-left: 1rem; padding: 0.4rem 1.2rem; border-radius: var(--radius-full);">Sell Item</button>
            </div>
        </div>
    </header>
    
    <!-- Main Content -->
    <main class="main-container container">
        
        <section style="margin-top: 3rem; text-align: center;">
            <div class="search-header-container animate-fade-up stagger-1">
                <span style="color: var(--text-muted); font-size: 1.2rem;">🔍</span>
                <input type="text" id="global-search-input" placeholder="Search auctions, collections, or communities...">
                <button class="btn btn-primary" onclick="search.performSearch()" style="border-radius: var(--radius-full); padding: 0.4rem 1.2rem;">Search</button>
            </div>
        </section>

        <div class="search-results-section animate-fade-up stagger-2">
            <!-- Sidebar Filters -->
            <aside class="filters-panel" id="filters-panel">
                <div class="filter-section">
                    <h4>Search In</h4>
                    <label class="filter-radio">
                        <input type="radio" name="scope" value="auctions" checked>
                        <span>Live Auctions</span>
                    </label>
                    <label class="filter-radio">
                        <input type="radio" name="scope" value="collections">
                        <span>Museum Collections</span>
                    </label>
                    <label class="filter-radio">
                        <input type="radio" name="scope" value="communities">
                        <span>Communities</span>
                    </label>
                </div>

                <div class="filter-section">
                    <h4>Category</h4>
                    <select id="filter-category" style="width: 100%; background: var(--dark-2); border-color: var(--border-glass);">
                        <option value="all">All Categories</option>
                        <option value="electronics">Electronics</option>
                        <option value="fashion">Fashion</option>
                        <option value="collectibles">Collectibles</option>
                        <option value="art">Art</option>
                        <option value="watches">Watches & Jewelry</option>
                        <option value="vehicles">Vehicles</option>
                        <option value="antiquities">Antiquities</option>
                    </select>
                </div>
                
                <button class="btn btn-outline btn-block" onclick="search.clearFilters()">Clear Filters</button>
            </aside>

            <!-- Results -->
            <div class="results-main">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                    <h2 style="font-family: var(--font-brand); font-size: 1.5rem; margin: 0;">Results <span id="results-count" style="color: var(--text-muted); font-size: 1rem; font-weight: normal;">(0)</span></h2>
                </div>

                <div id="loading-state" style="display: none; text-align: center; padding: 4rem 0;">
                    <div class="loading-spinner" style="margin: 0 auto 1rem;"></div>
                    <p style="color: var(--text-secondary);">Searching...</p>
                </div>

                <div id="results-grid" class="grid-container">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>

    </main>

    <script src="js/notify.js"></script>
    <script src="js/api.js"></script>
    <script src="js/search.js"></script>
</body>
</html>
