<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collections & Museum | FLEXY Collectors</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        .tabs {
            display: flex;
            background: var(--dark-2);
            border-bottom: 1px solid var(--border-glass);
            margin-bottom: 2rem;
            border-radius: var(--radius-md) var(--radius-md) 0 0;
            margin-top: 2rem;
        }
        .tab {
            padding: 1rem 2rem;
            cursor: pointer;
            color: var(--text-muted);
            font-weight: 600;
            border-bottom: 2px solid transparent;
            transition: all var(--transition-fast);
        }
        .tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
            background: var(--dark-1);
        }
        .collection-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 4rem;
        }
        .add-collection-btn {
            background: rgba(15, 157, 122, 0.1);
            border: 2px dashed var(--primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            color: var(--primary);
            font-weight: 600;
            cursor: pointer;
            border-radius: var(--radius-lg);
            min-height: 250px;
            transition: all var(--transition-fast);
        }
        .add-collection-btn:hover {
            background: rgba(15, 157, 122, 0.2);
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="page-fade-in">
    <!-- Header -->
    <header class="app-header">
        <div class="header-container container">
            <div class="logo-section" onclick="window.location.href='home.html'" style="cursor: pointer;">
                <div style="display: flex; align-items: center;">
                    <div class="logo-icon" aria-hidden="true" style="color: var(--primary); width: 32px; height: 32px; margin-right: 0.5rem;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="width: 100%; height: 100%;"><path d="m15 5 4 4" /><path d="m11 9 4 4" /><path d="m13 7-8 8" /><path d="M9 11l-4 4" /><path d="m13 13-7 7" /><path d="M20 20H10" /></svg>
                    </div>
                    <h1 class="app-logo">FLEXY</h1>
                </div>
            </div>
            
            <div class="header-actions">
                <button class="header-btn" onclick="window.location.href='home.html'">Home</button>
                <button class="header-btn" onclick="window.location.href='explore.html'">Explore</button>
                <button class="header-btn" onclick="window.location.href='communities.html'">Communities</button>
                <button class="header-btn active" onclick="window.location.href='collections.html'">Collections</button>
                <button class="header-btn" onclick="window.location.href='auctions.html'">Auctions</button>
                <button class="header-btn" onclick="window.location.href='messages.html'">Messages</button>
                <button class="header-btn" id="nav-notifications-btn" onclick="window.location.href='notifications.html'">Notifications</button>
                <button class="header-btn" onclick="window.location.href='wallet.html'">Wallet</button>
                <button class="header-btn" onclick="window.location.href='profile.html'">Profile</button>
                <button class="btn btn-primary" onclick="window.location.href='sell.html'" style="margin-left: 1rem; padding: 0.4rem 1.2rem; border-radius: var(--radius-full);">Sell Item</button>
            </div>
        </div>
    </header>
    
    <!-- Main Content -->
    <main class="main-container container">
        
        <div class="tabs animate-fade-up stagger-1">
            <div class="tab active" onclick="collectionsApp.switchTab('discover')" id="tab-discover">Discover Collections</div>
            <div class="tab" onclick="collectionsApp.switchTab('museum')" id="tab-museum">My Museum</div>
        </div>

        <div id="content-discover" class="animate-fade-up stagger-2">
            <div class="page-header" style="margin-bottom: 2rem;">
                <h2 style="font-family: var(--font-brand); font-size: 1.8rem; margin: 0 0 0.5rem 0;">Digital Museum</h2>
                <p style="color: var(--text-secondary); margin: 0;">Explore stunning collections curated by passionate collectors worldwide.</p>
            </div>
            <div id="discover-grid" class="collection-grid">
                <!-- Loading State -->
                <div style="grid-column: 1/-1; text-align: center; padding: 4rem;">
                    <div class="loading-spinner"></div>
                </div>
            </div>
        </div>

        <div id="content-museum" class="animate-fade-up stagger-2" style="display: none;">
            <div class="page-header" style="margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h2 style="font-family: var(--font-brand); font-size: 1.8rem; margin: 0 0 0.5rem 0;">My Museum</h2>
                    <p style="color: var(--text-secondary); margin: 0;">Your personal space to document, organize, and showcase your treasures.</p>
                </div>
            </div>
            <div id="museum-grid" class="collection-grid">
                <div class="add-collection-btn" onclick="window.location.href='create-collection.html'">
                    <span style="font-size: 2rem;">+</span>
                    <span>Create Collection</span>
                </div>
                <!-- Dynamic Content -->
            </div>
        </div>
        
    </main>

    <!-- Collection Modal -->
    <div class="modal-overlay" id="collection-modal" style="display: none;">
        <div class="modal-content" style="max-width: 800px; padding: 0;">
            <button class="close-modal" onclick="collectionsApp.closeModal()">×</button>
            <div id="modal-cover" style="height: 300px; background-size: cover; background-position: center;"></div>
            <div style="padding: 2rem;">
                <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem;">
                    <div>
                        <h2 id="modal-title" style="font-family: var(--font-brand); margin: 0 0 0.5rem 0;">Title</h2>
                        <div style="color: var(--text-muted); font-size: 0.9rem;" id="modal-author">By @author</div>
                    </div>
                    <button id="modal-like-btn" class="btn btn-outline" style="border-radius: var(--radius-full); padding: 0.4rem 1.2rem;">
                        🤍 Like <span id="modal-likes-count">0</span>
                    </button>
                </div>
                <p id="modal-desc" style="color: var(--text-secondary); line-height: 1.6; margin-bottom: 2rem;">Description</p>
                <h4 style="font-family: var(--font-brand); margin-bottom: 1rem; border-bottom: 1px solid var(--border-glass); padding-bottom: 0.5rem;">Exhibited Items</h4>
                <div id="modal-items-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1rem;">
                    <!-- Items -->
                </div>
            </div>
        </div>
    </div>

    <script src="js/notify.js"></script>
    <script src="js/api.js"></script>
    <script src="js/collections.js"></script>
</body>
</html>
